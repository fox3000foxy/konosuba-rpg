name: Test battery

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test-battery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run test battery
        run: bun run test-battery